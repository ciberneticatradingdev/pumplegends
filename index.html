<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PumpLegends — 3-Lane MOBA</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
      
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0f;
        color: #fff;
        font-family: "Press Start 2P", system-ui;
        overflow: hidden;
      }
      #game {
        display: block;
        image-rendering: pixelated;
        cursor: crosshair;
      }
      #hud {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding: 8px 16px;
        background: linear-gradient(rgba(0,0,0,0.85), transparent);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: none;
        z-index: 10;
      }
      .team-score {
        font-size: 14px;
        padding: 4px 12px;
        border: 2px solid;
      }
      .blue { color: #4a9eff; border-color: #4a9eff; }
      .red { color: #ff4a4a; border-color: #ff4a4a; }
      
      #bottom-hud {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.9);
        padding: 12px;
        display: flex;
        gap: 20px;
        align-items: center;
        border-top: 3px solid #333;
        z-index: 20;
      }
      .champ-portrait {
        width: 72px; height: 72px;
        background: #222;
        border: 3px solid #666;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: bold;
      }
      .bars {
        width: 220px;
      }
      .bar {
        height: 18px;
        background: #222;
        border: 2px solid #444;
        position: relative;
        margin-bottom: 3px;
      }
      .bar-fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        transition: width 0.1s linear;
      }
      .hp { background: #c0392b; }
      .mana { background: #2980b9; }
      
      .abilities {
        display: flex;
        gap: 8px;
      }
      .ability {
        width: 56px;
        height: 56px;
        background: #1a1a1f;
        border: 3px solid #555;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: bold;
      }
      .ability.ready { border-color: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
      .ability.cd { border-color: #555; }
      .ability::after {
        content: attr(data-cd);
        position: absolute;
        bottom: 2px;
        right: 4px;
        font-size: 11px;
        color: #fff;
      }
      .ability.r { border-color: #e74c3c; }
      
      #selection {
        position: fixed;
        inset: 0;
        background: rgba(10,10,15,0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .champ-select {
        display: flex;
        gap: 30px;
        margin-top: 30px;
      }
      .champ-card {
        width: 160px;
        padding: 16px;
        background: #1c1c22;
        border: 4px solid #444;
        text-align: center;
        cursor: pointer;
        transition: all 0.1s;
      }
      .champ-card:hover {
        border-color: #f1c40f;
        transform: scale(1.05);
      }
      .champ-card .icon {
        font-size: 48px;
        margin-bottom: 10px;
      }
      .title {
        font-size: 42px;
        margin-bottom: 8px;
        color: #f1c40f;
        text-shadow: 3px 3px #000;
      }
      button {
        background: #f1c40f;
        color: #000;
        border: none;
        padding: 16px 42px;
        font-family: inherit;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 30px;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      #overlay.show { display: flex; }
      .modal {
        background: #1a1a1f;
        padding: 40px;
        border: 4px solid #f1c40f;
        text-align: center;
        max-width: 420px;
      }
      .modal h1 { font-size: 28px; margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <canvas id="game" width="1280" height="720"></canvas>
    
    <!-- HUD -->
    <div id="hud">
      <div class="team-score blue">BLUE <span id="blue-kills">0</span></div>
      <div id="timer">00:00</div>
      <div class="team-score red"><span id="red-kills">0</span> RED</div>
    </div>
    
    <div id="bottom-hud">
      <div class="champ-portrait" id="portrait">?</div>
      <div class="bars">
        <div class="bar"><div class="bar-fill hp" id="hp-bar" style="width:100%"></div></div>
        <div class="bar"><div class="bar-fill mana" id="mana-bar" style="width:100%"></div></div>
      </div>
      <div style="margin-left:12px; font-size:13px; line-height:1.3;">
        <div id="champ-name">CHAMPION</div>
        <div><span id="level">Lv1</span> • <span id="gold">0g</span> • <span id="kda">0/0/0</span></div>
      </div>
      
      <div class="abilities">
        <div class="ability" data-key="Q"><span>Q</span><span class="cd"></span></div>
        <div class="ability" data-key="W"><span>W</span><span class="cd"></span></div>
        <div class="ability" data-key="E"><span>E</span><span class="cd"></span></div>
        <div class="ability r" data-key="R"><span>R</span><span class="cd"></span></div>
      </div>
    </div>
    
    <!-- Champion Selection -->
    <div id="selection">
      <div class="title">PUMPLEGENDS</div>
      <p style="margin-bottom: 10px; font-size:13px; color:#888;">3 LANES • MINIONS • TURRETS • NEXUS</p>
      
      <div class="champ-select">
        <div class="champ-card" data-champ="adc">
          <div class="icon">🏹</div>
          <div><strong>PUMP RANGER</strong></div>
          <div style="font-size:11px; color:#aaa; margin-top:8px;">ADC • Ranged</div>
        </div>
        <div class="champ-card" data-champ="melee">
          <div class="icon">⚔️</div>
          <div><strong>PUMP KNIGHT</strong></div>
          <div style="font-size:11px; color:#aaa; margin-top:8px;">MELEE • Bruiser</div>
        </div>
        <div class="champ-card" data-champ="mage">
          <div class="icon">🔥</div>
          <div><strong>PUMP SORCERER</strong></div>
          <div style="font-size:11px; color:#aaa; margin-top:8px;">MAGE • Burst</div>
        </div>
        <div class="champ-card" data-champ="tank">
          <div class="icon">🛡️</div>
          <div><strong>PUMP COLOSSUS</strong></div>
          <div style="font-size:11px; color:#aaa; margin-top:8px;">TANK • Durable</div>
        </div>
      </div>
      
      <button id="start-btn">ENTER THE RIFT</button>
    </div>
    
    <!-- Game Over Modal -->
    <div id="overlay">
      <div class="modal">
        <h1 id="end-title">VICTORY</h1>
        <p id="end-text" style="margin:20px 0; font-size:13px; line-height:1.5;"></p>
        <button onclick="restartGame()">PLAY AGAIN</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
